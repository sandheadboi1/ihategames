<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Obby Robby</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: black;
    }
    img {
      width: 100px;
      opacity: 0; /* hidden at start */
      animation: grow .2s ease-in-out forwards;
      animation-delay: 3s; /* wait 3 seconds */
    }
    @keyframes grow {
      from {
        opacity: 1;
        transform: scale(0.1);
      }
      to {
        opacity: 1;
        transform: scale(10);
      }
    }
  </style>
</head>
